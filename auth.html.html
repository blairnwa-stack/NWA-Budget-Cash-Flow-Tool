<!DOCTYPE html>
<html>
<head>
  <title>Budget — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* match your existing style */
    body { font-family: Inter, sans-serif; background: #f4f6f9;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 12px; padding: 40px;
            width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h2 { margin-bottom: 24px; color: #0f172a; }
    input { width: 100%; padding: 10px 12px; margin-bottom: 12px;
            border: 1.5px solid #e2e8f0; border-radius: 6px;
            font-size: 0.9rem; box-sizing: border-box; }
    button { width: 100%; padding: 11px; background: #2563eb;
             color: white; border: none; border-radius: 6px;
             font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    .toggle { text-align: center; font-size: 0.8rem; color: #64748b; cursor: pointer; }
    .msg { font-size: 0.75rem; color: #ef4444; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h2 id="form-title">Sign In</h2>
  <div class="msg" id="msg"></div>
  <input type="email"    id="email"    placeholder="Email address">
  <input type="password" id="password" placeholder="Password">
  <button onclick="submitForm()">Continue</button>
  <div class="toggle" onclick="toggleMode()" id="toggle-text">
    Don't have an account? Sign up
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://zmjjptofhvwxkazqfhxi.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptampwdG9maHZ3eGthenFmaHhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NDk4NTMsImV4cCI6MjA5OTAyNTg1M30.1Zek0nY55-I3VtcGfG5oMdnw9YqgHyf7Syydx8S3hQQ';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let isSignUp = false;

  async function submitForm() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('msg');
    const { error } = isSignUp
      ? await sb.auth.signUp({ email, password })
      : await sb.auth.signInWithPassword({ email, password });
    if (error) { msg.textContent = error.message; return; }
    if (isSignUp) { msg.style.color='green'; msg.textContent='Check your email to confirm!'; }
    else window.location.href = 'index.html';
  }

  function toggleMode() {
    isSignUp = !isSignUp;
    document.getElementById('form-title').textContent = isSignUp ? 'Create Account' : 'Sign In';
    document.getElementById('toggle-text').textContent = isSignUp
      ? 'Already have an account? Sign in'
      : "Don't have an account? Sign up";
  }

  // Already logged in? Go straight to app
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });
</script>
</body>
</html>
